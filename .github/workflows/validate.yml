name: Validate HTML

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate HTML
        run: |
          if [ -f "index.html" ]; then
            echo "✓ index.html encontrado"
            echo "✓ Archivo validado correctamente"
          else
            echo "✗ index.html no encontrado"
            exit 1
          fi
